{% load static %}
<!DOCTYPE html>
<html>
    <head>
         <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>To-do-list</title>
        <link rel="webiste icon" type="png" href="{% static 'image/logo.png'%}"></link>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href='{%static 'css/todo.css'%}' rel='stylesheet'>
    </head>
    <body>
        <div class='container-fluid'>
            <div class='row'>
                <div class='col-lg-1'></div>
                <div class='col-lg-4 mt-5 '>
                    <div class='d-flex '>
                        <h4 class='id' >{{request.session.seesionName}}'s To-do's</h4>
                        <a  href='{% url "logout" %}'title='logout'><i class='bi bi-box-arrow-right'></i></a>
                    </div>
                       <h1 class='h3'>To-Do-List</h1>
                       <form method='POST'>
                           {% csrf_token %}
                         <input type='text' required name='title' class='form-control'><br>
                         
   
                         <input type='submit' value='Add Task' class='btn  '>
                       </form>
              </div>
              <div class='col-lg-1'></div>
              <div class='col-lg-5'>
                    <div class='teddy'>
                        
                        <div class='face'>
                         <div class='inface'>
                            <div class='ear1'><div class='in'></div></div>
                            <div class='ear2'><div class='in'></div></div>
                              <div class='eye1'><div class='point'></div></div>
                              <div class='eye2'><div class='point'></div></div>
                              <div class='nose'></div>
                              <div class='nnose'>︶︶</div>
                           </div>
                           <div class='hand1'></div>
                        <div class='hand2'></div>
                        </div>
                        
                        
                    </div>
                     <div class='task'>
                        <div class='list p-2'>
                          {% for todo in todo %}
                          <div class='top'>
                            <span>{{forloop.counter}}</span>
                            <p>{{todo.title}}</P>
                                <div class='doo'>
                                 <a class='ms-5' href='{% url "edit" todo.sno %}'><i class='bi bi-pencil-fill '></i></a>
                                 <a href='{% url "delete" todo.sno %}'><i class='bi bi-trash-fill text-danger'></i></a>
                                </div>
                          </div>
                             
                          {% endfor %} 
                        </div>
                     </div>
                     
                </div>  
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
    
</html>
