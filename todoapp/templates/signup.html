{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>SignUp</title>
        <link rel="webiste icon" type="png" href="{% static 'image/logo.png'%}"></link>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href='{%static 'css/style.css'%}' rel='stylesheet'></link>
    </head>
    <body style=' background-image: url({% static "image/back.jpeg"%});'>
        <div class='container'>
            <div class='row'>
                <div class='col-lg-4'></div>
               
                <div class='col-lg-4' id='signup'>
                    <div class='sign'>
                    <h5>SignUp</h5>
                    <form method='POST'>
                        {% csrf_token %}
                      <label for='uname'>Username</label>
                      <input type='text' required name='name' class='form-control ' id='uname' >
                      <label for='uenail'>Email</label>
                      <input type='email' required name='email' class='form-control ' id='uenail'>
                      <label for='upass'>Password</label>
                      <input type='password' required name='password' class='form-control ' id='upass'>
                      <input type='submit' value='Submit' class='btn w-100 my-3 '>
                    </form>
                     <div>
                        {% if error %}
                        <p class='error'>{{error}}</p>
                        {% endif %}
                        
                     </div>
                        <p>Already have an account ?<a href='/login/'>Login</a></p>
                    </div>
                   
                </div>
                <div class='col-lg-3'></div>
                
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
    
</html>
